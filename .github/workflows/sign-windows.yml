name: Sign Windows Binaries (SignPath)

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to sign binaries for (leave empty for latest release)'
        required: false
        type: string
        default: ''

permissions:
  id-token: write
  contents: write
  actions: read

jobs:
  sign-and-release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      actions: read
    steps:
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.release-tag }}" ]; then
            TAG="${{ inputs.release-tag }}"
          else
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName')
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved tag: $TAG (version: $VERSION)"

      - name: Download unsigned Windows binaries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p unsigned/exe unsigned/msi
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir unsigned/exe \
            --pattern '*.exe'
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir unsigned/msi \
            --pattern '*.msi'

          EXE=$(find unsigned/exe -name '*.exe' -type f | head -1)
          MSI=$(find unsigned/msi -name '*.msi' -type f | head -1)
          if [ -z "$EXE" ] || [ -z "$MSI" ]; then
            echo "::error::Could not find .exe or .msi in release $TAG"
            exit 1
          fi
          echo "Downloaded EXE: $EXE"
          echo "Downloaded MSI: $MSI"

      - name: Upload .exe as workflow artifact
        id: upload-exe
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-exe
          path: unsigned/exe/*.exe
          if-no-files-found: error
          retention-days: 1

      - name: Upload .msi as workflow artifact
        id: upload-msi
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-msi
          path: unsigned/msi/*.msi
          if-no-files-found: error
          retention-days: 1

      - name: Sign .exe with SignPath
        id: sign-exe
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ secrets.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}'
          artifact-configuration-slug: '${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}'
          github-artifact-id: '${{ steps.upload-exe.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'signed/exe'

      - name: Sign .msi with SignPath
        id: sign-msi
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ secrets.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}'
          artifact-configuration-slug: '${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}'
          github-artifact-id: '${{ steps.upload-msi.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'signed/msi'

      - name: Prepare release assets
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          mkdir -p release-assets

          EXE=$(find signed/exe -name '*.exe' -type f | head -1)
          MSI=$(find signed/msi -name '*.msi' -type f | head -1)

          if [ -z "$EXE" ] || [ -z "$MSI" ]; then
            echo "::error::Signed artifacts not found"
            exit 1
          fi

          cp "$EXE" "release-assets/open-dronelog_${VERSION}_windows_x86_64.exe"
          cp "$MSI" "release-assets/open-dronelog_${VERSION}_windows_x86_64.msi"

          echo "Prepared signed release assets:"
          ls -la release-assets/

      - name: Upload signed binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "$TAG" release-assets/* \
            --repo "${{ github.repository }}" \
            --clobber
          echo "Signed binaries uploaded to release $TAG"

      - name: Regenerate checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p all-assets
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir all-assets \
            --pattern '*.deb' \
            --pattern '*.rpm' \
            --pattern '*.AppImage' \
            --pattern '*.dmg' \
            --pattern '*.exe' \
            --pattern '*.msi' \
            --pattern '*.nsis.zip' \
            --pattern 'open-dronelog_*' || true

          cd all-assets
          if ls * &>/dev/null; then
            sha256sum * | sort -k2 > ../checksums.txt
            echo "Regenerated checksums:"
            cat ../checksums.txt
            cd ..
            gh release upload "$TAG" checksums.txt \
              --repo "${{ github.repository }}" \
              --clobber
            echo "Checksums updated"
          else
            echo "::warning::No assets found to checksum"
          fi
