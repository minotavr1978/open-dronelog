name: Full Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-info:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      name: ${{ steps.info.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate release info
        id: info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}-uk-${GITHUB_RUN_NUMBER}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=Open DroneLog $TAG" >> "$GITHUB_OUTPUT"

          cat > release-notes.md <<EOF
          Open DroneLog Ukrainian Build

          Base version: v${VERSION}

          Includes:
          - Windows build
          - Linux build
          - macOS build
          - Signed Android APKs
          - Ukrainian localization

          Commit: ${GITHUB_SHA}
          EOF

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  desktop:
    needs: release-info
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - ubuntu-22.04
          - macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm install

      - name: Build desktop
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.release-info.outputs.tag }}
          releaseName: ${{ needs.release-info.outputs.name }}
          releaseBody: Open DroneLog Ukrainian build
          releaseDraft: false
          prerelease: false

  android:
    needs: release-info
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install dependencies
        run: npm install

      - name: Init Android
        run: npx tauri android init

      - name: Setup Android signing
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/open-dronelog-release.jks"
          echo "storeFile=$RUNNER_TEMP/open-dronelog-release.jks" >> keystore.properties

      - name: Check signing config
        run: |
          ls -lah src-tauri/gen/android
          cat src-tauri/gen/android/keystore.properties
          test -f "$RUNNER_TEMP/open-dronelog-release.jks"

      - name: Build signed Android APKs
        run: npx tauri android build

      - name: Collect APKs
        run: |
          mkdir -p dist-apk
          find . -name "*.apk" -type f -exec cp {} dist-apk/ \;
          ls -lah dist-apk

      - name: Upload Android APKs to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-info.outputs.tag }}
          name: ${{ needs.release-info.outputs.name }}
          files: dist-apk/*.apk