name: Build Android Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (наприклад v3.2.3-uk)"
        required: true
        default: "v3.2.3-uk"

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install dependencies
        run: npm install

      - name: Init Android
        run: npx tauri android init

      - name: Restore keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/app/open-dronelog-release.jks

      - name: Build signed APK
        env:
          TAURI_ANDROID_SIGNING_KEY_PATH: open-dronelog-release.jks
          TAURI_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          TAURI_ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: npx tauri android build

      - name: Collect APKs
        run: |
          mkdir dist-apk
          find . -name "*.apk" -exec cp {} dist-apk/ \;
          ls -lah dist-apk

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Open DroneLog ${{ github.event.inputs.tag }}
          files: dist-apk/*.apk